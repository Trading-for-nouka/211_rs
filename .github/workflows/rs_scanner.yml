name: RS Scanner

on:
  #schedule:
    #- cron: '0 7 * * 1-5'  # 平日 16:00 JST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run RS Scanner
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python rs_scanner.py
      - name: Commit selected_positions_rs.json
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          if [ -f selected_positions_rs.json ]; then
            git add selected_positions_rs.json
            if ! git diff --cached --quiet; then
              git commit -m "Update selected_positions_rs [skip ci]"
              git push
            fi
          fi
