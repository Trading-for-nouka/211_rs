# このファイルを置いてください
# ============================================================

name: RS Monitor

on:
  #schedule:
    # 平日 16:00 JST（07:00 UTC）に実行 ← 取引終了(15:30)後の余裕を持たせた時刻
   # - cron: '0 7 * * 1-5'
  workflow_dispatch:  # GitHub画面から手動実行も可能

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install yfinance pandas numpy requests python-dotenv

      - name: Run RS Monitor
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: python rs_monitor.py
